<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f4f8;   /* soft silent grey-blue */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-card {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            width: 450px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .form-title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            color: #4b6cb7;   /* soft blue */
        }

        .btn-update {
            background: #4b6cb7;
            color: white;
            font-weight: bold;
            width: 100%;
            border-radius: 10px;
            padding: 10px;
        }

        .btn-update:hover {
            background: #3a56a0;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #3a56a0;
            font-weight: bold;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="form-card">
        <h2 class="form-title">✏️ Update Student</h2>

        <form method="POST" enctype="multipart/form-data">  <!-- IMPORTANT -->
         {% csrf_token %}
          {{ form.as_p }}

        {% if form.instance.images %}
        <img src="{{ form.instance.images.url }}" width="100">
         {% endif %}

    <button type="submit">Update</button>
</form>

        <div class="back-link">
            <a href="{% url 'list_student' %}">⬅ Back to Student List</a>
        </div>
    </div>

</body>
</html>
