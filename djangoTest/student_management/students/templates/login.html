<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#141e30,#243b55);
        }

        .login-box{
            width:350px;
            padding:30px;
            border-radius:12px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            box-shadow:0 0 25px rgba(0,0,0,0.4);
            color:white;
            text-align:center;
        }

        .login-box h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:6px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#00c6ff;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0072ff;
        }

        .error{
            color:#ff4d4d;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🎓 Student Management Login</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="error">
        {{ error }}
    </div>
</div>

</body>
</html>
