<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #6a11cb, #2575fc); min-height: 100vh; padding: 40px;">

    <h2 class="text-center text-white mb-4">🎓 All Students</h2>

    <div class="container p-4 bg-white rounded shadow">
        

        <a href="{% url 'add_student' %}" class="btn btn-success mb-3">➕ Add New Student</a>
        <a href="{% url 'logout' %}" class="btn btn-success mb-3">- Logout</a>

        <table class="table table-bordered table-hover text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Image</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.name }}</td>
                    <td>{{ s.email }}</td>
                    <td>{{ s.age }}</td>
                    <td>{{ s.course }}</td>

                    <td>
                        {% if s.images %}
                            <img src="{{ s.images.url }}" width="80" height="80" style="border-radius: 8px;">
                        {% else %}
                            <span>No Image</span>
                        {% endif %}
                    </td>

                    <td>
                        <a href="{% url 'update_student' s.id %}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="{% url 'delete_student' s.id %}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?');">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

    <div style="position:fixed;bottom:20px;right:20px;background:#111;padding:15px;border-radius:10px;color:white;width:250px;">
    <input id="msg" placeholder="Ask AI..." style="width:100%;">
    <button onclick="sendAI()">Send</button>
    <p id="reply"></p>
</div>

<script>
function sendAI(){
    fetch("/ai-chat/",{
        method:"POST",
        headers:{
            "X-CSRFToken":"{{ csrf_token }}"
        },
        body:new URLSearchParams({
            message:document.getElementById("msg").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("reply").innerText=data.reply;
    })
}
</script>

</body>
</html>
