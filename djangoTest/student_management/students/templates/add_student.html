<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .form-card {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: black;
        }

        .form-title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 20px;
            color: #28a745;
        }

        .btn-save {
            background: #28a745;
            color: white;
            font-weight: bold;
            width: 100%;
            border-radius: 10px;
            padding: 10px;
        }

        .btn-save:hover {
            background: #218838;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #155724;
            font-weight: bold;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="form-card">
        <h2 class="form-title">➕ Add New Student</h2>

       <form method="POST" enctype="multipart/form-data">  <!-- IMPORTANT -->
         {% csrf_token %}
           {{ form.as_p }}
       <button type="submit">Save</button>
       </form>

        <div class="back-link">
            <a href="{% url 'list_student' %}">⬅ Back to Student List</a>
        </div>
    </div>

</body>
</html>
